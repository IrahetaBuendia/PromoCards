name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, type-check & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build --filter=@promocards/types

      - name: Type-check
        run: pnpm turbo type-check

      - name: Lint
        run: pnpm turbo lint

      - name: Test
        run: pnpm turbo test
        # No bloquea el CI si no hay tests definidos todavía
        continue-on-error: true
